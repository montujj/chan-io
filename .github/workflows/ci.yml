name: Chan IO CI

on:
  push:
    branches:
      - main
      - mjdev
      - dev
      - 'feature/**'
      - 'bugfix/**'
      - 'VFX-*'
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.9', '3.11', '3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-mock
        pip install -e .

    - name: Run tests
      run: |
        pytest tests/ -v

    - name: Verify package imports correctly
      run: |
        python -c "from chan.dcc_interface import ChanDCCInterface; print('dcc_interface import OK')"
